trigger:
- main

variables:
  imageName: myapp
  acrLoginServer: addconreg.azurecr.io

stages:

# 🔹 BUILD + PUSH IMAGE
- stage: Build
  jobs:
  - job: BuildAndPush
    pool:
      vmImage: ubuntu-latest

    steps:
    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        containerRegistry: 'acr-conn'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          $(Build.BuildId)

# 🔹 DEPLOY TO AKS
- stage: Deploy
  dependsOn: Build
  jobs:
  - job: DeployToAKS
    pool:
      vmImage: ubuntu-latest

    steps:

    # ✅ Apply deployment.yaml
    - task: Kubernetes@1
      displayName: Apply Deployment
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscriptionEndpoint: 'azure-conn'
        azureResourceGroup: 'rg-aks'
        kubernetesCluster: 'adds-aks'
        command: apply
        useConfigurationFile: true
        configuration: 'deployment.yaml'

    # ✅ Apply service.yaml
    - task: Kubernetes@1
      displayName: Apply Service
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscriptionEndpoint: 'azure-conn'
        azureResourceGroup: 'rg-aks'
        kubernetesCluster: 'adds-aks'
        command: apply
        useConfigurationFile: true
        configuration: 'service.yaml'

    # 🔥 Update image dynamically (AUTO DEPLOYMENT)
    - task: Kubernetes@1
      displayName: Update Image in AKS
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscriptionEndpoint: 'azure-conn'
        azureResourceGroup: 'rg-aks'
        kubernetesCluster: 'adds-aks'
        command: set
        arguments: image deployment/myapp myapp=$(acrLoginServer)/$(imageName):$(Build.BuildId)