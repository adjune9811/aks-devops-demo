trigger:
- main

variables:
  imageName: myapp
  acrLoginServer: addconreg.azurecr.io

stages:

# 🔹 BUILD + PUSH IMAGE
- stage: Build
  jobs:
  - job: BuildAndPush
    pool:
      vmImage: ubuntu-latest

    steps:
    - task: Docker@2
      inputs:
        containerRegistry: 'acr-conn'
        repository: '$(imageName)'
        command: 'buildAndPush'
        Dockerfile: 'Dockerfile'
        tags: |
          $(Build.BuildId)

# 🔹 DEPLOY TO AKS
- stage: Deploy
  dependsOn: Build
  jobs:
  - job: DeployToAKS
    pool:
      vmImage: ubuntu-latest

    steps:

    - task: Kubernetes@1
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscriptionEndpoint: 'azure-conn'
        azureResourceGroup: 'rg-aks'
        kubernetesCluster: 'adds-aks'
        command: apply
        useConfigurationFile: true
        configuration: |
          deployment.yaml
          service.yaml

    # 🔥 THIS IS THE MAGIC STEP
    - script: |
        kubectl set image deployment/myapp myapp=$(acrLoginServer)/$(imageName):$(Build.BuildId)
      displayName: 'Update image in AKS'