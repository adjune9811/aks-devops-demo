apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: addconreg.azurecr.io/myapp:latest   # ✅ base image only
        imagePullPolicy: Always                   # ✅ always pull latest image
        ports:
        - containerPort: 80